name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "backend_image=${REGISTRY}/${IMAGE_PREFIX}-backend:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "frontend_image=${REGISTRY}/${IMAGE_PREFIX}-frontend:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend.prod
          push: true
          tags: ${{ steps.meta.outputs.backend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend.prod
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.environment == 'staging' || (github.ref == 'refs/heads/main' && github.event.inputs.environment != 'production')
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (staging)
        run: |
          echo "Deploying to staging environment..."
          echo "Backend image: ${{ needs.build.outputs.backend_image }}"
          echo "Frontend image: ${{ needs.build.outputs.frontend_image }}"
          # Add your deployment commands here (e.g., Render, AWS, Azure)
          # Example for Render:
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (production)
        run: |
          echo "Deploying to production environment..."
          echo "Backend image: ${{ needs.build.outputs.backend_image }}"
          echo "Frontend image: ${{ needs.build.outputs.frontend_image }}"
          # Add your deployment commands here
          # Example for Render:
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ] || [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed or skipped."
          fi
