version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ediv_postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-education_district_iv}
      - POSTGRES_USER=${POSTGRES_USER:-ediv_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ediv_user} -d ${POSTGRES_DB:-education_district_iv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ediv_network

  redis:
    image: redis:7-alpine
    container_name: ediv_redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ediv_network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ediv_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ediv_network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ediv_rabbitmq
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-ediv_rabbit}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ediv_network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: ediv_backend
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ../.env.production
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-ediv_rabbit}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ediv_network

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: ediv_celery_worker
    restart: always
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - media_volume:/app/media
    env_file:
      - ../.env.production
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-ediv_rabbit}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      - backend
      - rabbitmq
    networks:
      - ediv_network

  celery_beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: ediv_celery_beat
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - media_volume:/app/media
    env_file:
      - ../.env.production
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-ediv_rabbit}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      - backend
      - rabbitmq
    networks:
      - ediv_network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend.prod
    container_name: ediv_frontend
    restart: always
    networks:
      - ediv_network

  nginx:
    image: nginx:1.24-alpine
    container_name: ediv_nginx
    restart: always
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - ediv_network

  prometheus:
    image: prom/prometheus:latest
    container_name: ediv_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ediv_network

  grafana:
    image: grafana/grafana:latest
    container_name: ediv_grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ediv_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
  static_volume:
  media_volume:
  prometheus_data:
  grafana_data:

networks:
  ediv_network:
    driver: bridge
